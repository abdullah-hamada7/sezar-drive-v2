name: Build Android APK
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build release APK
        working-directory: mobile
        run: |
          flutter pub get
          flutter build apk --release --dart-define=FLAVOR=prod

      - name: Generate checksums
        working-directory: mobile/build/app/outputs/flutter-apk
        run: |
          sha256sum app-release.apk > SHA256SUMS.txt
          ls -lah

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sezar-driver-apk
          path: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/flutter-apk/SHA256SUMS.txt
          if-no-files-found: error
