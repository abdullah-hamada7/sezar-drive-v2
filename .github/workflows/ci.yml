name: CI — Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: latest + commit SHA)'
        required: false
        default: 'latest'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_USERNAME: abdullahhamada7
  BACKEND_IMAGE: abdullahhamada7/sezar-drive-backend
  FRONTEND_IMAGE: abdullahhamada7/sezar-drive-frontend

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          SHA_TAG="${GITHUB_SHA::7}"
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ] && [ "$INPUT_TAG" != "latest" ]; then
            echo "backend_tags=${BACKEND_IMAGE}:${INPUT_TAG},${BACKEND_IMAGE}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
            echo "frontend_tags=${FRONTEND_IMAGE}:${INPUT_TAG},${FRONTEND_IMAGE}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "backend_tags=${BACKEND_IMAGE}:latest,${BACKEND_IMAGE}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
            echo "frontend_tags=${FRONTEND_IMAGE}:latest,${FRONTEND_IMAGE}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}

  apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Decode google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 -d > android/app/google-services.json
        working-directory: mobile

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Build release APK
        run: flutter build apk --release --dart-define=FLAVOR=prod
        working-directory: mobile

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sezar-driver-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run deploy commands on EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy sezar-drive" \
            --parameters '{"commands":["cd ~/sezar-drive","docker compose -f compose.prod.yml pull","docker compose -f compose.prod.yml --profile ops run --rm migrate","docker compose -f compose.prod.yml up -d"]}' \
            --output text
