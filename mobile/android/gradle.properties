org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=false
android.useAndroidX=true
# Must stay false — Flutter 3.44.x plugin doesn't support AGP 9 new DSL
android.newDsl=false
# Must stay false — camera_android_camerax and other plugins still apply org.jetbrains.kotlin.android
# Setting true causes AGP 9 to reject those plugins. Revert when all plugins migrate.
android.builtInKotlin=false
kotlin.incremental=false
org.gradle.caching=false
