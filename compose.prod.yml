# Fleet Management Platform — Production Docker Compose
# Usage: docker compose -f compose.prod.yml up -d

services:
  # ─── Reverse Proxy (SSL) ────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: fleet-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      EMAIL_FOR_SSL: ${EMAIL_FOR_SSL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - app-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Redis (Cache/Socket.IO) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: fleet-redis-prod
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data_prod:/data
    networks:
      - app-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── PostgreSQL Database ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fleet-postgres-prod
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "effective_cache_size=192MB"

  # ─── Backend API ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fleet-backend-prod
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/ready', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));" ]
    env_file: .env
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      RUN_MIGRATIONS_ON_STARTUP: "true"
      RUN_SEED_ON_STARTUP: "true"
    networks:
      - app-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Frontend ───────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fleet-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:
  caddy_data:
  caddy_config:
