version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sezar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sezar_drive
      POSTGRES_USER: sezar
      POSTGRES_PASSWORD: sezar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sezar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
